<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商用外销GTM资料查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="container mt-4">
    <h2 class="text-center mb-4">商用外销GTM资料查询</h2>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">产品大类</label>
                    <select id="categorySelect" class="form-select" onchange="loadSeries()">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">产品系列</label>
                    <select id="seriesSelect" class="form-select" onchange="filterData()">
                        <option value="">请选择产品大类</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">GTM资料类型</label>
                    <select id="gtmSelect" class="form-select" onchange="filterData()">
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="col-md-3 align-self-end">
                    <button class="btn btn-primary w-100" onclick="refreshData()">🔄 刷新最新数据</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table id="dataTable" class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>GTM资料</th>
                            <th>是否上传</th>
                            <th>资料名称</th>
                            <th>资料编号</th>
                            <th>创建者</th>
                            <th>数据状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center text-muted">请点击「刷新最新数据」加载数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailModalLabel">资料详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
