<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商用外销GTM资料查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* 允许手动拖动列宽，取消强制截断，解决文字压缩 */
        .table {
            width: 100% !important;
        }
        th, td {
            padding: 6px 8px !important;
            vertical-align: middle !important;
            /* 允许换行，长名称不被压缩 */
            white-space: normal !important;
        }
        /* 开启表头可拖动列宽（浏览器原生支持） */
        th {
            user-select: none;
            resize: horizontal;
            overflow: auto;
            min-width: 80px;
        }
        /* 操作列保证按钮完整显示 */
        td:last-child {
            min-width: 140px;
            white-space: nowrap !important;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem !important;
            margin: 0 2px;
        }
    </style>
</head>
<body class="container mt-4">
    <h2 class="text-center mb-4">商用外销GTM资料查询</h2>
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">产品大类</label>
                    <select id="categorySelect" class="form-select">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">产品系列</label>
                    <select id="seriesSelect" class="form-select">
                        <option value="">请点击刷新加载数据</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">GTM资料类型</label>
                    <select id="gtmSelect" class="form-select">
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="col-md-3 align-self-end">
                    <button id="refreshBtn" class="btn btn-primary w-100">🔄 刷新最新数据</button>
                </div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table id="dataTable" class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>GTM资料</th>
                            <th>是否上传</th>
                            <th>资料名称</th>
                            <th>资料编号</th>
                            <th>当前版本</th>
                            <th>创建者</th>
                            <th>数据状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" class="text-center text-muted">请点击「刷新最新数据」加载数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailModalLabel">资料详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
